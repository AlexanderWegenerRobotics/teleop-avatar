rendering:
  enabled: false
  fps: 30

simulation:
  timestep: 0.001
  control_frequency: 1000
  model_path: "../models/mujoco/scenes/world_scene.xml"

devices:
  - name: arm_left
    model_path: "../models/mujoco/robots/franka_fr3/fr3_torque.xml"
    urdf_path: "../models/urdf/allegro_hand/fr3_allegro_hand_90deg.urdf"
    root_body: "link0"
    urdf_ee_name: "palm_link"
    gripper_actuator: "actuator8"

  - name: hand_left
    model_path: "../models/mujoco/robots/allegro_hand/allegro_hand_right_A.xml"
    root_body: "link_0_0"
    attach_to: "arm_left_fr3_link7"
    attach_offset:
      position: [0.15, 0, 0.132]
      orientation: [0, 0.7071, 0, 0.7071]

  - name: arm_right
    model_path: "../models/mujoco/robots/franka_fr3/fr3_torque.xml"
    urdf_path: "../models/urdf/allegro_hand/fr3_allegro_hand_90deg.urdf"
    root_body: "link0"
    urdf_ee_name: "palm_link"
    gripper_actuator: "actuator8"

  - name: hand_right
    model_path: "../models/mujoco/robots/allegro_hand/allegro_hand_right_A.xml"
    root_body: "link_0_0"
    attach_to: "arm_right_fr3_link7"
    attach_offset:
      position: [0.15, 0, 0.132]
      orientation: [0, 0.7071, 0, 0.7071]

  - name: head
    model_path: "../models/mujoco/robots/pan_tilt_dummy/pan_tilt_dummy.xml"
    root_body: "base"

objects:
  - name: table
    type: static
    model_path: "../models/mujoco/props/table.xml"
    pose:
      position: [0.4, 0, 0]
      orientation: [1, 0, 0, 0]

  - name: wall
    type: static
    model_path: "../models/mujoco/props/wall.xml"
    pose:
      position: [0, 0, 0]
      orientation: [1, 0, 0, 0]

  - name: right_base_frame
    type: visual
    model_path: "../models/mujoco/props/coordinate_frame.xml"
    pose:
      position: [0, -0.6, 0.8]
      orientation: [0.5, 0.5, 0.5, 0.5]

  - name: box_1
    type: dynamic
    model_path: "../models/mujoco/props/box_red.xml"
    pose:
      position: [0.8, 0.0, 0.6]
      orientation: [1, 0, 0, 0]

  - name: target_right
    type: mocap
    model_path: "../models/mujoco/props/target_frame.xml"
    enabled: True
    pose:
      position: [0, 0, 0]
      orientation: [1, 0, 0, 0]

  - name: target_left
    type: mocap
    model_path: "../models/mujoco/props/target_frame.xml"
    enabled: True
    pose:
      position: [0, 0, 0]
      orientation: [1, 0, 0, 0]

  - name: target_raw_right
    type: mocap
    model_path: "../models/mujoco/props/target_frame.xml"
    enabled: True
    pose:
      position: [0, 0, 0]
      orientation: [1, 0, 0, 0]

  - name: target_raw_left
    type: mocap
    model_path: "../models/mujoco/props/target_frame.xml"
    enabled: True
    pose:
      position: [0, 0, 0]
      orientation: [1, 0, 0, 0]

  - name: place_pose
    type: mocap
    model_path: "../models/mujoco/props/target_frame.xml"
    enabled: True
    pose:
      position: [0, 0, 0]
      orientation: [1, 0, 0, 0]

  - name: background_front
    type: static
    model_path: "../models/mujoco/props/background.xml"
    pose:
      position: [1.5, 0, 0]
      orientation: [1, 0, 0, 0]

  - name: background_left
    type: static
    model_path: "../models/mujoco/props/background.xml"
    pose:
      position: [0, 1.5, 0]
      orientation: [0.7071, 0, 0, 0.7071]

  - name: background_right
    type: static
    model_path: "../models/mujoco/props/background.xml"
    pose:
      position: [0, -1.5, 0]
      orientation: [0.7071, 0, 0, 0.7071]

cameras:
  - name: workspace_overview_1
    enabled: False
    type: fixed
    pos: [1.5, 0, 0.8]
    look_at: [0.4, 0.0, 0.4]
    fovy: 90

  - name: workspace_overview_2
    enabled: False
    type: fixed
    pos: [0.3, 0.3, 1.9]
    look_at: [0.0, 0.0, 0.4]
    fovy: 90

  - name: workspace_overview_3
    enabled: False
    type: fixed
    pos: [0.5, 0.3, 0.9]
    look_at: [0.5, 0.0, 0.7]
    fovy: 90