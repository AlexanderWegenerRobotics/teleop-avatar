avatar:
  transmission:
    remote_ip: "10.112.24.173"
    send_port: 8000
    receive_port: 7000
    frequency: 20

  # Episode signals forwarded to the avatar_pipeline process
  pipeline_logger:
    enabled:  true
    host:     "127.0.0.1"
    port:     7100          # must match pipeline_config.yaml episode_listener_port

  self_collision:
    enabled: false
    d_min: 0.10
    alpha: 3.0
    beta: 0.1

devices:
  - name: arm_left
    type: arm
    enabled: True
    transmission:
      remote_ip: "10.112.24.173"
      send_port: 8001
      receive_port: 7001
      frequency: 200
    
    base_pose:
      position: [0, 0.4, 0.8]
      orientation: [0.5, -0.5,  0.5, -0.5]
    q0: [-0.3, -1.1, 0.3, -2.0, 0.5, 2.9, -0.9]
    max_torque: [87, 87, 87, 87, 12, 12, 12]
    max_torque_rate: [1000, 1000, 1000, 1000, 1000, 1000, 1000]
    q_min: [-2.8973, -1.7628, -2.8973, -3.0718, -2.8973, 0.0175, -2.8973]
    q_max: [2.8973, 1.7628, 2.8973, -0.0698, 2.8973, 3.7525, 2.8973]

    control:
      kp_joint: [600, 600, 600, 600, 250, 150, 50]
      kd_joint: [50,  50,  50,  50,  30,  25,  15]
      kp_cart: [1000, 1000, 1000, 250, 250, 250]
      kd_cart: [50, 50, 50, 15, 15, 15]
      kp_null: [20, 20, 20, 20, 8, 8, 8]
      kd_null: [2, 2, 2, 2, 1, 1, 1]
      kp_joint_limit: [30, 28, 26, 22, 4, 8, 10]
      kd_joint_limit: [1.8, 1.6, 1.5, 1.35, 0.3, 0.5, 0.8]

    safety:
      workspace_min: [0.6, -0.3, 0.425]
      workspace_max: [1.0,  0.3, 1.0]
      table_height_world: 0.425
      ee_fingertip_length: 0.127
      table_safety_margin: 0.01
      max_command_velocity: 2.0
      max_command_angular_velocity: 5.0
      max_tilt_angle: 1.74533
      joint_limit_buffer: 0.25
      joint_limit_torque_frac: 0.40

  - name: arm_right
    type: arm
    enabled: True
    transmission:
      remote_ip: "10.112.24.173"
      send_port: 8002
      receive_port: 7002
      frequency: 200
    
    base_pose:
      position: [0, -0.4, 0.8]
      orientation: [0.5, 0.5, 0.5, 0.5]
    q0: [0.3, -1.1, -0.3, -2.0, -0.5, 2.9, 0.9]
    max_torque: [87, 87, 87, 87, 12, 12, 12]
    max_torque_rate: [1000, 1000, 1000, 1000, 1000, 1000, 1000]
    q_min: [-2.8973, -1.7628, -2.8973, -3.0718, -2.8973, 0.0175, -2.8973]
    q_max: [2.8973, 1.7628, 2.8973, -0.0698, 2.8973, 3.7525, 2.8973]

    control:
      kp_joint: [600, 600, 600, 600, 250, 150, 50]
      kd_joint: [50,  50,  50,  50,  30,  25,  15]
      kp_cart: [1000, 1000, 1000, 250, 250, 250]
      kd_cart: [50, 50, 50, 15, 15, 15]
      kp_null: [20, 20, 20, 20, 8, 8, 8]
      kd_null: [2, 2, 2, 2, 1, 1, 1]
      kp_joint_limit: [30, 28, 26, 22, 4, 8, 10]
      kd_joint_limit: [1.8, 1.6, 1.5, 1.35, 0.3, 0.5, 0.8]
    safety:
      workspace_min: [0.6, -0.3, 0.425]
      workspace_max: [1.0,  0.3, 1.0]
      table_height_world: 0.425
      ee_fingertip_length: 0.127
      table_safety_margin: 0.01
      max_command_velocity: 2.0
      max_command_angular_velocity: 5.0
      max_tilt_angle: 1.74533
      joint_limit_buffer: 0.25
      joint_limit_torque_frac: 0.40

  - name: head
    type: head
    enabled: True
    transmission:
      remote_ip: "10.112.24.173"
      send_port: 8003
      receive_port: 7003
      frequency: 200

    base_pose:
      position: [0, 0, 1.2]
      orientation: [1, 0, 0, 0]
    q0: [0.0, -0.4]
    max_torque: [20, 20]
    max_torque_rate: [1000, 1000]
    control:
      kp_joint: [50, 50]
      kd_joint: [5, 5]
    camera:
      name: head_head_cam
      position: [0.05, 0.0, 0.035]
      euler_xyz: [1.5708, -1.5708, 0.0]

  - name: hand_left
    type: gripper
    enabled: True
    transmission:
      remote_ip: "10.112.24.173"
      send_port: 8004
      receive_port: 7004
      frequency: 20
    base_pose:
      position: [0, 0, 0]
      orientation: [1, 0, 0, 0]

  - name: hand_right
    type: gripper
    enabled: True
    transmission:
      remote_ip: "10.112.24.173"
      send_port: 8005
      receive_port: 7005
      frequency: 20
    base_pose:
      position: [0, 0, 0]
      orientation: [1, 0, 0, 0]

  - name: camera_right
    type: sensor
    enabled: False
    base_pose:
      position: [0, 0, 0]
      orientation: [1, 0, 0, 0]

  - name: camera_left
    type: sensor
    enabled: False
    base_pose:
      position: [0, 0, 0]
      orientation: [1, 0, 0, 0]